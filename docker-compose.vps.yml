version: "3.9"

networks:
  devsecops:
    driver: bridge

volumes:
  gitea_data:
  gitea_db:
  woodpecker_data:
  authentik_db:
  authentik_redis:
  authentik_media:
  defectdojo_db:
  defectdojo_media:
  prometheus_data:
  grafana_data:
  loki_data:
  n8n_data:
  caddy_data:
  caddy_config:
  caddy_logs:
  crowdsec_db:
  crowdsec_config:

services:

  # ----------------------------------------------------------
  # CADDY — reverse proxy + TLS + WAF (Coraza) + CrowdSec
  # ----------------------------------------------------------
  caddy:
    image: ghcr.io/hslatman/caddy-crowdsec-bouncer/caddy-crowdsec-bouncer:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    environment:
      CROWDSEC_API_KEY: ${CROWDSEC_API_KEY}
      CROWDSEC_API_URL: http://crowdsec:8080
      N8N_BASIC_AUTH_PASSWORD_HASH: ${N8N_BASIC_AUTH_PASSWORD_HASH}
    networks:
      - devsecops
    mem_limit: 256m
    depends_on:
      - crowdsec

  # ----------------------------------------------------------
  # CROWDSEC — поведенческий IPS
  # ----------------------------------------------------------
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: >
        crowdsecurity/caddy
        crowdsecurity/http-cve
        crowdsecurity/wordpress
        crowdsecurity/nginx
      GID: 1000
    volumes:
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - crowdsec_db:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - caddy_logs:/var/log/caddy:ro
      - /var/log:/var/log/host:ro
    networks:
      - devsecops
    mem_limit: 256m

  # ----------------------------------------------------------
  # GITEA — git сервер
  # ----------------------------------------------------------
  gitea-db:
    image: postgres:16-alpine
    container_name: gitea-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD}
    volumes:
      - gitea_db:/var/lib/postgresql/data
    networks:
      - devsecops
    mem_limit: 256m

  gitea:
    image: gitea/gitea:1.21
    container_name: gitea
    restart: unless-stopped
    depends_on:
      - gitea-db
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__security__SECRET_KEY: ${GITEA_SECRET_KEY}
      GITEA__server__DOMAIN: git.security-stand.space
      GITEA__server__ROOT_URL: https://git.security-stand.space
      GITEA__server__SSH_DOMAIN: git.security-stand.space
      GITEA__webhook__ALLOWED_HOST_LIST: ci.security-stand.space,woodpecker-server
    volumes:
      - gitea_data:/data
    ports:
      - "2222:22"
    networks:
      - devsecops
    mem_limit: 512m

  # ----------------------------------------------------------
  # WOODPECKER CI
  # ----------------------------------------------------------
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:latest
    container_name: woodpecker-server
    restart: unless-stopped
    depends_on:
      - gitea
    environment:
      WOODPECKER_OPEN: "true"
      WOODPECKER_HOST: https://ci.security-stand.space
      WOODPECKER_GITEA: "true"
      WOODPECKER_GITEA_URL: https://git.security-stand.space
      WOODPECKER_GITEA_CLIENT: ${WOODPECKER_GITEA_CLIENT}
      WOODPECKER_GITEA_SECRET: ${WOODPECKER_GITEA_SECRET}
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET}
      WOODPECKER_MAX_PROCS: "1"
    volumes:
      - woodpecker_data:/var/lib/woodpecker
    networks:
      - devsecops
    mem_limit: 256m

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:latest
    container_name: woodpecker-agent
    restart: unless-stopped
    depends_on:
      - woodpecker-server
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET}
      WOODPECKER_MAX_PROCS: "1"
      WOODPECKER_BACKEND: docker
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devsecops
    mem_limit: 256m

  # ----------------------------------------------------------
  # AUTHENTIK
  # ----------------------------------------------------------
  authentik-db:
    image: postgres:16-alpine
    container_name: authentik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
    volumes:
      - authentik_db:/var/lib/postgresql/data
    networks:
      - devsecops
    mem_limit: 256m

  authentik-redis:
    image: redis:7-alpine
    container_name: authentik-redis
    restart: unless-stopped
    volumes:
      - authentik_redis:/data
    networks:
      - devsecops
    mem_limit: 64m

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.2
    container_name: authentik-server
    restart: unless-stopped
    command: server
    depends_on:
      - authentik-db
      - authentik-redis
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik_media:/media
    networks:
      - devsecops
    mem_limit: 512m

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.2
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    depends_on:
      - authentik-db
      - authentik-redis
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
    volumes:
      - authentik_media:/media
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devsecops
    mem_limit: 256m

  # ----------------------------------------------------------
  # DEFECTDOJO
  # ----------------------------------------------------------
  defectdojo-db:
    image: postgres:16-alpine
    container_name: defectdojo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: defectdojo
      POSTGRES_USER: defectdojo
      POSTGRES_PASSWORD: ${DD_DATABASE_PASSWORD}
    volumes:
      - defectdojo_db:/var/lib/postgresql/data
    networks:
      - devsecops
    mem_limit: 256m

  defectdojo:
    image: defectdojo/defectdojo-nginx:latest
    container_name: defectdojo
    restart: unless-stopped
    depends_on:
      - defectdojo-uwsgi
    environment:
      NGINX_METRICS_ENABLED: "false"
    networks:
      - devsecops
    mem_limit: 128m

  defectdojo-uwsgi:
    image: defectdojo/defectdojo-django:latest
    container_name: defectdojo-uwsgi
    restart: unless-stopped
    depends_on:
      - defectdojo-db
    environment:
      DD_DATABASE_URL: postgresql://defectdojo:${DD_DATABASE_PASSWORD}@defectdojo-db:5432/defectdojo
      DD_SECRET_KEY: ${DD_SECRET_KEY}
      DD_CREDENTIAL_AES_256_KEY: ${DD_SECRET_KEY}
      DD_ALLOWED_HOSTS: "dojo.security-stand.space"
      DD_CELERY_BROKER_URL: redis://authentik-redis:6379/1
      DD_CELERY_RESULT_BACKEND: redis://authentik-redis:6379/1
    networks:
      devsecops:
        aliases:
          - uwsgi
    mem_limit: 512m

  # ----------------------------------------------------------
  # PROMETHEUS
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=4GB"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - devsecops
    mem_limit: 256m

  # ----------------------------------------------------------
  # GRAFANA
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.security-stand.space
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Authentik
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OAUTH_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://auth.security-stand.space/application/o/authorize/
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://authentik-server:9000/application/o/token/
      GF_AUTH_GENERIC_OAUTH_API_URL: http://authentik-server:9000/application/o/userinfo/
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: contains(groups, 'admins') && 'Admin' || 'Viewer'
      GF_AUTH_SIGNOUT_REDIRECT_URL: https://auth.security-stand.space/application/o/grafana/end-session/
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - devsecops
    mem_limit: 256m

  # ----------------------------------------------------------
  # LOKI + PROMTAIL
  # ----------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - devsecops
    mem_limit: 256m

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - devsecops
    mem_limit: 128m

  # ----------------------------------------------------------
  # N8N
  # ----------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      N8N_HOST: n8n.security-stand.space
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.security-stand.space
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - devsecops
    mem_limit: 512m

  # ----------------------------------------------------------
  # JUICE SHOP — мишень
  # ----------------------------------------------------------
  juiceshop:
    image: bkimminich/juice-shop:latest
    container_name: juiceshop
    restart: unless-stopped
    networks:
      - devsecops
    mem_limit: 256m

  # ----------------------------------------------------------
  # FALCO — runtime security (работает на Linux)
  # ----------------------------------------------------------
  falco:
    image: falcosecurity/falco:latest
    container_name: falco
    privileged: true
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /dev:/host/dev
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - ./falco/falco_rules.yaml:/etc/falco/falco_rules.local.yaml:ro
    networks:
      - devsecops
    mem_limit: 256m

  # ----------------------------------------------------------
  # CADVISOR — метрики контейнеров
  # ----------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - devsecops
    mem_limit: 128m
